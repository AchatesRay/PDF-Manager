name: Build PDF Manager

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller `
            --name "PDF Manager" `
            --noconsole `
            --onefile `
            --clean `
            --hidden-import paddle `
            --hidden-import paddleocr `
            --hidden-import paddle.dataset.image `
            --hidden-import fitz `
            --hidden-import whoosh `
            --hidden-import whoosh.fields `
            --hidden-import whoosh.index `
            --hidden-import whoosh.qparser `
            --hidden-import jieba `
            --hidden-import jieba.analyse `
            --hidden-import PIL `
            --hidden-import numpy `
            --exclude-module tkinter `
            --exclude-module matplotlib `
            --exclude-module scipy `
            --exclude-module pandas `
            src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Manager-Windows
          path: dist/PDF Manager.exe
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/PDF Manager.exe
          generate_release_notes: true